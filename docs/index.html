<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVBox 订阅源导航</title>
  <meta name="description" content="TVBox 影视订阅源导航站 - 收录主流影视、动漫、短剧等订阅源，一键复制链接">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1 class="header-title">📺 TVBox 订阅源导航</h1>
        <p class="header-desc">多仓订阅源导航，一键复制订阅链接</p>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
          <span class="theme-icon-light">🌙</span>
          <span class="theme-icon-dark">☀️</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main container">
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索订阅源名称..." autocomplete="off">
        <button class="search-clear" id="searchClear" aria-label="清除搜索">✕</button>
      </div>
      <div class="stats" id="stats">
        <span class="stat-total">共 <strong id="totalCount">0</strong> 个订阅源</span>
      </div>
    </div>

    <div id="categories" class="categories"></div>

    <div class="empty-state" id="emptyState" hidden>
      <span class="empty-icon">🔍</span>
      <p class="empty-text">没有找到匹配的订阅源</p>
    </div>
  </main>

  <div class="toast" id="toast" role="alert"></div>

  <footer class="footer">
    <div class="container">
      <p>TVBox 订阅源导航 · 数据仅供学习参考</p>
      <p class="footer-links">
        <a href="https://github.com/chudogb/tvbox" target="_blank" rel="noopener">GitHub</a>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
